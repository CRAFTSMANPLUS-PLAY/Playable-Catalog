<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CRAFTSMAN+ • Playable Catalog</title>

  <style>
    :root{
      --bg:#0b0c0e;
      --panel:#121317;
      --panel2:#0f1013;
      --border:rgba(255,255,255,.08);
      --text:#fff;
      --muted:rgba(255,255,255,.65);
      --muted2:rgba(255,255,255,.45);
      --orange:#f86400;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Inter",Roboto,Arial,sans-serif;
    }

    /* TOP BAR (match screenshot: left logo, center search, right filters) */
    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      background:linear-gradient(to bottom, rgba(0,0,0,.75), rgba(0,0,0,.35));
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(255,255,255,.06);
      padding:14px 18px;
      display:flex;
      align-items:center;
      gap:16px;
    }
    .brand{
      font-weight:800;
      letter-spacing:.08em;
      font-size:14px;
      white-space:nowrap;
    }
    .brand .plus{ color:var(--orange); }

    .topbar-center{
      flex:1;
      display:flex;
      justify-content:center;
    }
    .search{
      width:min(720px, 100%);
      display:flex;
      align-items:center;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:10px 12px;
      gap:8px;
    }
    .search input{
      width:100%;
      background:transparent;
      border:none;
      outline:none;
      color:var(--text);
      font-size:14px;
    }
    .search input::placeholder{ color:rgba(255,255,255,.35); }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      white-space:nowrap;
    }

    .control{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:var(--text);
      border-radius:10px;
      padding:10px 10px;
      font-size:13px;
      outline:none;
      height:40px;
    }
    select.control{
      padding-right:34px;
      cursor:pointer;
    }

    /* Datalist input (company searchable dropdown) */
    .control.company{
      width:220px;
    }

    /* PAGE WRAP */
    .wrap{
      padding:26px 18px 60px;
      max-width:1400px;
      margin:0 auto;
    }

    /* SECTION HEADERS */
    .section{
      margin-top:34px;
    }
    .section h2{
      margin:0 0 16px;
      font-size:13px;
      letter-spacing:.2em;
      color:var(--muted2);
      font-weight:700;
      text-transform:uppercase;
    }

    /* GRID 4 ACROSS */
    .grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:18px;
    }
    @media (max-width:1100px){
      .grid{ grid-template-columns:repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width:820px){
      .grid{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .topbar{ flex-wrap:wrap; }
      .topbar-center{ width:100%; order:3; }
    }

    /* TILE CARD */
    .tile{
      background:linear-gradient(to bottom, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.07);
      border-radius:14px;
      overflow:hidden;
      position:relative;
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease;
      min-height:280px;
    }
    .tile:hover{
      transform:translateY(-2px);
      border-color:rgba(248,100,0,.35);
    }
    .thumb{
      width:100%;
      height:180px;
      object-fit:cover;
      display:block;
      background:#0a0a0a;
    }
    .tile-body{
      padding:12px 14px 14px;
    }
    .company{
      font-weight:700;
      font-size:14px;
      margin:0 0 2px;
    }
    .title{
      margin:0;
      font-size:12.5px;
      color:var(--muted);
    }
    .tile-actions{
      display:flex;
      gap:10px;
      margin-top:12px;
    }
    .btn{
      border-radius:8px;
      font-size:12px;
      padding:8px 10px;
      cursor:pointer;
      border:1px solid rgba(248,100,0,.55);
      background:transparent;
      color:var(--orange);
    }
    .btn.primary{
      background:var(--orange);
      border-color:transparent;
      color:#fff;
    }
    .btn:active{ transform:translateY(1px); }

    /* CLICK TO PLAY OVERLAY */
    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:12px;
      background:rgba(0,0,0,.55);
      opacity:0;
      transition:opacity .18s ease;
    }
    .tile:hover .overlay{ opacity:1; }

    /* MODAL */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.72);
      z-index:50;
      padding:22px;
    }
    .modal-card{
      background:rgba(18,19,23,.95);
      border:1px solid rgba(255,255,255,.09);
      border-radius:16px;
      padding:16px;
      width:min(520px, 95vw);
      box-shadow:0 12px 70px rgba(0,0,0,.55);
    }
    .modal-title{
      font-size:22px;
      font-weight:800;
      margin:4px 0 12px;
      text-align:center;
    }
    .modal-actions{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:12px;
    }
    .modal-actions .btn{
      border-radius:10px;
      padding:10px 14px;
    }

    /* FIXED IFRAME SIZE (your request) */
    .frame-wrap{
      width:200px;
      height:400px;
      margin:0 auto;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#000;
    }
    iframe{
      width:100%;
      height:100%;
      border:0;
      background:#000;
      display:block;
    }
    .modal-note{
      text-align:center;
      color:var(--muted2);
      font-size:12px;
      margin-top:10px;
    }

    /* small close hint */
    .close-hint{
      text-align:center;
      margin-top:10px;
      color:rgba(255,255,255,.35);
      font-size:12px;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">CRAFTSMAN<span class="plus">+</span></div>

    <div class="topbar-center">
      <div class="search" title="Search by title/company">
        <input id="searchInput" type="text" placeholder="Search playable catalog..." />
      </div>
    </div>

    <div class="topbar-right">
      <select id="genreFilter" class="control" aria-label="Genre">
        <option value="All">All</option>
        <option value="Brand">Brand</option>
        <option value="Gaming">Gaming</option>
      </select>

      <input id="companyFilter" class="control company" list="companyList" placeholder="Company" aria-label="Company" />
      <datalist id="companyList"></datalist>
    </div>
  </div>

  <div class="wrap">
    <div id="content"></div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-card" id="modalCard">
      <div class="modal-title" id="modalTitle">Title – Company</div>

      <div class="modal-actions">
        <button class="btn" id="reloadBtn">Reload</button>
        <button class="btn primary" id="externalBtn">Open External</button>
      </div>

      <div class="frame-wrap">
        <iframe id="playFrame" src=""></iframe>
      </div>

      <div class="modal-note" id="modalNote"></div>
      <div class="close-hint">Click outside to close</div>
    </div>
  </div>

  <script>
    const ORANGE = "#f86400";

    const contentEl = document.getElementById("content");
    const searchEl = document.getElementById("searchInput");
    const genreEl = document.getElementById("genreFilter");
    const companyEl = document.getElementById("companyFilter");
    const companyListEl = document.getElementById("companyList");

    const modalEl = document.getElementById("modal");
    const modalCardEl = document.getElementById("modalCard");
    const modalTitleEl = document.getElementById("modalTitle");
    const modalNoteEl = document.getElementById("modalNote");
    const frameEl = document.getElementById("playFrame");
    const reloadBtn = document.getElementById("reloadBtn");
    const externalBtn = document.getElementById("externalBtn");

    let data = [];

    function norm(s){ return (s || "").toString().trim(); }
    function lower(s){ return norm(s).toLowerCase(); }

    function getThumb(item){
      const t = norm(item.thumbnail);
      if (!t) return "";
      return "thumbnails/" + t;
    }

    function isValidEndpoint(url){
      // endpoint should look like ".../index.html"
      const u = norm(url);
      return u && u.includes("index.html");
    }

    function buildCompanyOptions(items){
      const companies = [...new Set(items.map(i => norm(i.Company)).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
      companyListEl.innerHTML = "";
      companies.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        companyListEl.appendChild(opt);
      });
    }

    function filteredItems(){
      const q = lower(searchEl.value);
      const genre = genreEl.value;
      const company = norm(companyEl.value);

      return data.filter(item => {
        const title = lower(item.Title);
        const comp  = lower(item.Company);
        const g     = norm(item.Genre);

        const matchSearch = !q || title.includes(q) || comp.includes(q) || lower(g).includes(q);
        const matchGenre  = (genre === "All") || (g === genre);
        const matchCompany= (!company) || (norm(item.Company) === company);

        return matchSearch && matchGenre && matchCompany;
      });
    }

    function render(){
      const items = filteredItems();

      // group only into Brand / Gaming sections (per your request)
      const groups = {
        Brand: items.filter(i => norm(i.Genre) === "Brand"),
        Gaming: items.filter(i => norm(i.Genre) === "Gaming")
      };

      contentEl.innerHTML = "";

      ["Brand","Gaming"].forEach(sectionName => {
        const sectionItems = groups[sectionName];
        if (!sectionItems.length) return;

        const section = document.createElement("div");
        section.className = "section";

        const h2 = document.createElement("h2");
        h2.textContent = sectionName;
        section.appendChild(h2);

        const grid = document.createElement("div");
        grid.className = "grid";

        sectionItems.forEach(item => {
          const tile = document.createElement("div");
          tile.className = "tile";

          const thumb = document.createElement("img");
          thumb.className = "thumb";
          const src = getThumb(item);
          if (src) thumb.src = src;
          thumb.alt = `${norm(item.Title)} thumbnail`;
          thumb.onerror = () => { thumb.style.display = "none"; };

          const overlay = document.createElement("div");
          overlay.className = "overlay";
          overlay.textContent = "Click to Play";

          const body = document.createElement("div");
          body.className = "tile-body";

          const company = document.createElement("p");
          company.className = "company";
          company.textContent = norm(item.Company) || "Unknown Company";

          const title = document.createElement("p");
          title.className = "title";
          title.textContent = norm(item.Title) || "Untitled";

          const actions = document.createElement("div");
          actions.className = "tile-actions";

          const reload = document.createElement("button");
          reload.className = "btn";
          reload.textContent = "Reload";

          const external = document.createElement("button");
          external.className = "btn primary";
          external.textContent = "Open External";

          // IMPORTANT: prevent action buttons from also opening modal click
          reload.addEventListener("click", (e) => {
            e.stopPropagation();
            // "Reload" on tile just opens modal and reloads once (useful UX)
            openModal(item, true);
          });

          external.addEventListener("click", (e) => {
            e.stopPropagation();
            const previewUrl = norm(item.URL);
            if (previewUrl) window.open(previewUrl, "_blank");
          });

          actions.appendChild(reload);
          actions.appendChild(external);

          body.appendChild(company);
          body.appendChild(title);
          body.appendChild(actions);

          tile.appendChild(thumb);
          tile.appendChild(overlay);
          tile.appendChild(body);

          tile.addEventListener("click", () => openModal(item, false));

          grid.appendChild(tile);
        });

        section.appendChild(grid);
        contentEl.appendChild(section);
      });
    }

    function openModal(item, forceReload){
      const title = norm(item.Title);
      const company = norm(item.Company);
      const endpoint = item["Endpoint URL"]; // exact key
      const previewUrl = norm(item.URL);

      modalTitleEl.textContent = `${title || "Untitled"} – ${company || "Company"}`;
      modalNoteEl.textContent = "";

      // External always goes to Preview URL (per your instruction)
      externalBtn.onclick = () => {
        if (previewUrl) window.open(previewUrl, "_blank");
      };

      // Reload cache-busts endpoint
      reloadBtn.onclick = () => {
        if (!isValidEndpoint(endpoint)) return;
        const base = norm(endpoint);
        const bust = (base.includes("?") ? "&" : "?") + "_=" + Date.now();
        frameEl.src = base + bust;
      };

      // Load playable from Endpoint URL (must be HTML)
      if (!isValidEndpoint(endpoint)){
        frameEl.src = "about:blank";
        modalNoteEl.textContent =
          "This item’s Endpoint URL is missing or not an index.html (it’s likely why you’re seeing JSON). Update the JSON to point to the HTML index.html endpoint.";
      } else {
        const base = norm(endpoint);
        const url = forceReload ? (base + (base.includes("?") ? "&" : "?") + "_=" + Date.now()) : base;
        frameEl.src = url;
      }

      modalEl.style.display = "flex";
    }

    function closeModal(){
      modalEl.style.display = "none";
      frameEl.src = "about:blank";
      modalNoteEl.textContent = "";
    }

    // click outside closes
    modalEl.addEventListener("click", (e) => {
      if (e.target === modalEl) closeModal();
    });

    // ESC closes
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modalEl.style.display === "flex") closeModal();
    });

    // filters
    searchEl.addEventListener("input", render);
    genreEl.addEventListener("change", render);
    companyEl.addEventListener("input", render);

    async function init(){
      try{
        const r = await fetch("Playable_Endpoint_URLs.json?_=" + Date.now());
        if (!r.ok) throw new Error("Playable_Endpoint_URLs.json not found");
        data = await r.json();

        // If your JSON currently doesn’t have Company, but has "title/subtitle" etc, stop here and tell me.
        // This page expects: Title, Company, Genre, URL, Endpoint URL, thumbnail

        buildCompanyOptions(data);
        render();
      }catch(err){
        contentEl.innerHTML = `<div style="padding:18px;color:#ffb3b3">
          <b>Error loading JSON:</b> ${err.message}<br/>
          Ensure <code>Playable_Endpoint_URLs.json</code> is in the repo root and valid JSON.
        </div>`;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
