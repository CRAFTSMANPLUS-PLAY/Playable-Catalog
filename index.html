<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CRAFTSMAN+ • Playable Catalog</title>

  <style>
    :root{
      --bg:#0b0c0d;
      --panel:#111214;
      --tile:#141518;
      --tileBorder: rgba(255,255,255,.10);
      --text:#fff;
      --muted: rgba(255,255,255,.55);
      --muted2: rgba(255,255,255,.35);
      --orange:#ff6a00;
      --orange2:#ff7a1a;
      --radius: 16px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:
        radial-gradient(1200px 600px at 50% -50%, rgba(255,106,0,.18), transparent 60%),
        radial-gradient(900px 500px at 15% -40%, rgba(255,255,255,.08), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", Roboto, sans-serif;
      min-height: 100vh;
    }

    /* TOP BAR */
    .topbar{
      position: sticky;
      top:0;
      z-index:10;
      height: 72px;
      display:flex;
      align-items:center;
      gap:16px;
      padding: 0 22px;
      background: rgba(10,10,10,.82);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width: 220px;
    }
    .brand .logo{
      font-weight: 800;
      letter-spacing: .12em;
      font-size: 16px;
    }
    .brand .logo .plus{
      color: var(--orange);
      margin-left: 2px;
    }

    .searchwrap{
      flex: 1;
      display:flex;
      justify-content:center;
    }
    .search{
      width: min(720px, 100%);
      position: relative;
    }
    .search input{
      width:100%;
      height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 0 14px;
      font-size: 14px;
      outline: none;
    }
    .search input::placeholder{ color: rgba(255,255,255,.35); }

    .filters{
      display:flex;
      align-items:center;
      gap:10px;
      min-width: 360px;
      justify-content:flex-end;
    }
    .select, .companySelect{
      height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 0 12px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }
    .companySelect{ width: 220px; }
    .select{ width: 120px; }

    /* SECTION HEADERS */
    .content{
      padding: 28px 22px 42px;
    }
    .sectionTitle{
      margin: 26px 0 14px;
      font-size: 12px;
      letter-spacing: .22em;
      color: rgba(255,255,255,.35);
      text-transform: uppercase;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }
    @media (max-width: 1300px){
      .grid{ grid-template-columns: repeat(3, minmax(0,1fr)); }
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); }
      .filters{ min-width: unset; }
      .brand{ min-width: unset; }
    }
    @media (max-width: 640px){
      .grid{ grid-template-columns: repeat(1, minmax(0,1fr)); }
      .companySelect{ width: 160px; }
    }

    /* TILE */
    .tile{
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      overflow:hidden;
      position: relative;
      height:520px;
      display:flex;
      flex-direction:column;
      box-shadow: 0 30px 90px rgba(0,0,0,.35);
      transition: transform .15s ease, border-color .15s ease;
    }
    .tile:hover{
      transform: translateY(-2px);
      border-color: rgba(255,106,0,.55);
    }
    .tileHeader{
      padding:14px 16px 10px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      position:relative;
      z-index:2;
    }
    .company{
      font-weight: 700;
      font-size: 14px;
      color: rgba(255,255,255,.90);
      line-height: 1.1;
    }
    .title{
      font-size: 13px;
      color: rgba(255,255,255,.55);
      line-height: 1.1;
    }

    .tileButtons{
      padding: 0 16px 8px 16px;
      display:flex;
      gap:10px;
      position: relative;
      z-index: 2;
    }
    .btn{
      height: 30px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,106,0,.6);
      background: transparent;
      color: var(--orange);
      font-size: 12px;
      cursor:pointer;
    }
    .btn.primary{
      background: var(--orange);
      color:#111;
      border-color: transparent;
      font-weight: 700;
    }
    .btn:hover{ filter: brightness(1.05); }

    .thumbWrap{
      position:relative;
      width:100%;
      height:380px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:6px;
      overflow:hidden;
      z-index:1;
    }

    .thumbImg{
      width:210px;
      height:374px;
      object-fit:cover;
      border-radius:16px;
      opacity:.95;
      box-shadow:0 25px 70px rgba(0,0,0,.6);
      position:relative;
      z-index:1;
      transition: transform .25s ease;
    }

    .thumbOverlay{
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:380px;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.15),
        rgba(0,0,0,0.6)
      );
      opacity:0;
      transition:opacity .25s ease;
      pointer-events:none;
      z-index:2;
    }

    .thumbWrap:hover .thumbOverlay{ opacity:1; }
    .thumbWrap:hover .thumbImg{ transform:scale(1.03); }

    .clickToPlay{
      position:absolute;
      inset:0;
      top:60px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:3;
      color:rgba(255,255,255,.9);
      font-weight:800;
      letter-spacing:.12em;
      font-size:12px;
      text-transform:uppercase;
      opacity:0;
      transition:opacity .2s ease;
      pointer-events:none;
    }
    .tile:hover .clickToPlay{ opacity:1; }

    /* MODAL */
    .modalBackdrop{
      position: fixed;
      inset:0;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(4px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index: 100;
      padding: 20px;
    }
    .modal{
      width: min(560px, 96vw);
      background: rgba(20,21,24,.96);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      box-shadow: 0 40px 140px rgba(0,0,0,.55);
      overflow:hidden;
      position: relative;
    }
    .modalTop{
      padding: 14px 16px 10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
      text-align:center;
    }
    .modalTitle{
      font-size: 22px;
      font-weight: 800;
      color: rgba(255,255,255,.92);
    }
    .modalActions{
      display:flex;
      gap:10px;
      justify-content:center;
    }

    .modalBody{
      padding: 10px 16px 18px;
      display:flex;
      justify-content:center;
    }

    .previewFrameWrap{
      width: 350px;
      height: 622px; /* 350 * 16/9 */
      border-radius: 18px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.12);
      background:#000;
    }
    .previewFrameWrap iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }

    .hint{
      margin-top: 10px;
      color: rgba(255,255,255,.45);
      font-size: 12px;
      padding: 0 18px 16px;
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <div class="logo">CRAFTSMAN<span class="plus">+</span></div>
    </div>

    <div class="searchwrap">
      <div class="search">
        <input id="searchInput" type="text" placeholder="Search playable catalog..." />
      </div>
    </div>

    <div class="filters">
      <select id="genreSelect" class="select" aria-label="Genre">
        <option value="all">All</option>
        <option value="brand">Brand</option>
        <option value="gaming">Gaming</option>
      </select>

      <select id="companySelect" class="companySelect" aria-label="Company">
        <option value="">Company</option>
      </select>
    </div>
  </div>

  <div class="content">
    <div id="brandSection">
      <div class="sectionTitle">Brand</div>
      <div id="brandGrid" class="grid"></div>
    </div>

    <div id="gamingSection">
      <div class="sectionTitle">Gaming</div>
      <div id="gamingGrid" class="grid"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modalBackdrop" class="modalBackdrop" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <div class="modalTop">
        <div class="modalTitle" id="modalTitle">—</div>
        <div class="modalActions">
          <button class="btn" id="modalReload">Reload</button>
          <button class="btn primary" id="modalExternal">Open External</button>
        </div>
      </div>

      <div class="modalBody">
        <div class="previewFrameWrap">
          <iframe id="modalFrame" src=""></iframe>
        </div>
      </div>

      <div class="hint" id="modalHint"></div>
    </div>
  </div>

  <script>
    const JSON_PATH = 'Playable_Endpoint_URLs.json';
    const THUMB_BASE = 'thumbnails/';

    const searchInput = document.getElementById('searchInput');
    const genreSelect = document.getElementById('genreSelect');
    const companySelect = document.getElementById('companySelect');

    const brandGrid = document.getElementById('brandGrid');
    const gamingGrid = document.getElementById('gamingGrid');
    const brandSection = document.getElementById('brandSection');
    const gamingSection = document.getElementById('gamingSection');

    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const modalFrame = document.getElementById('modalFrame');
    const modalReload = document.getElementById('modalReload');
    const modalExternal = document.getElementById('modalExternal');
    const modalHint = document.getElementById('modalHint');

    let allItems = [];
    let filteredItems = [];
    let currentModalItem = null;

    function norm(str){ return (str || '').toString().trim(); }
    function lower(str){ return norm(str).toLowerCase(); }

    function getEndpoint(item){
      return norm(item['Endpoint URL'] || item.Endpoint || item.endpoint || item.endpoint_url);
    }
    function getExternal(item){
      return norm(item.URL || item.Url || item.link || item.preview || item.Preview);
    }
    function getThumb(item){
      let t = norm(item.thumbnail || item.Thumbnail);
      if (!t) return '';
      if (t.startsWith('thumbnails/')) return t;
      return THUMB_BASE + t;
    }
    function getCompany(item){
      return norm(item.Company || item.company || item['Company Name'] || item.Client || '');
    }
    function getTitle(item){
      return norm(item.Title || item.title || item['Playable Title'] || '');
    }
    function getGenre(item){
      return lower(item.Genre);
    }

    async function loadData(){
      const r = await fetch(JSON_PATH + '?_=' + Date.now());
      if(!r.ok) throw new Error('Could not load JSON: ' + JSON_PATH);
      allItems = await r.json();

      allItems = allItems
        .map(x => ({
          ...x,
          Genre: lower(x.Genre) === 'brand' ? 'brand' : (lower(x.Genre) === 'gaming' ? 'gaming' : lower(x.Genre))
        }))
        .filter(x => x.Genre === 'brand' || x.Genre === 'gaming');

      buildCompanyDropdown(allItems);
      applyFilters();
    }

    function buildCompanyDropdown(items){
      const companies = Array.from(new Set(items.map(getCompany).filter(Boolean)))
        .sort((a,b) => a.localeCompare(b));

      companySelect.innerHTML = '<option value="">Company</option>';
      for(const c of companies){
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        companySelect.appendChild(opt);
      }
    }

    function applyFilters(){
      const q = lower(searchInput.value);
      const g = genreSelect.value; // all | brand | gaming
      const c = norm(companySelect.value);

      filteredItems = allItems.filter(item => {
        const matchesText =
          !q ||
          lower(getTitle(item)).includes(q) ||
          lower(getCompany(item)).includes(q);

        const matchesGenre =
          g === 'all' || getGenre(item) === g;

        const matchesCompany =
          !c || getCompany(item) === c;

        return matchesText && matchesGenre && matchesCompany;
      });

      render();
    }

    function render(){
      brandGrid.innerHTML = '';
      gamingGrid.innerHTML = '';

      const brand = filteredItems.filter(x => getGenre(x) === 'brand');
      const gaming = filteredItems.filter(x => getGenre(x) === 'gaming');

      brandSection.style.display = (genreSelect.value === 'gaming') ? 'none' : '';
      gamingSection.style.display = (genreSelect.value === 'brand') ? 'none' : '';

      for(const item of brand) brandGrid.appendChild(makeTile(item));
      for(const item of gaming) gamingGrid.appendChild(makeTile(item));
    }

    function makeTile(item){
      const tile = document.createElement('div');
      tile.className = 'tile';

      const header = document.createElement('div');
      header.className = 'tileHeader';

      const company = document.createElement('div');
      company.className = 'company';
      company.textContent = getCompany(item) || '—';

      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = getTitle(item) || '—';

      header.appendChild(company);
      header.appendChild(title);

      const buttons = document.createElement('div');
      buttons.className = 'tileButtons';

      const btnExternal = document.createElement('button');
      btnExternal.className = 'btn primary';
      btnExternal.textContent = 'Open External';

      buttons.appendChild(btnExternal);

      const thumbWrap = document.createElement('div');
      thumbWrap.className = 'thumbWrap';

      const img = document.createElement('img');
      img.className = 'thumbImg';
      const thumb = getThumb(item);
      img.src = thumb || '';
      img.alt = (getTitle(item) || 'Playable') + ' thumbnail';
      img.loading = 'lazy';
      img.onerror = () => { img.style.display = 'none'; };

      const overlay = document.createElement('div');
      overlay.className = 'thumbOverlay';

      thumbWrap.appendChild(img);
      thumbWrap.appendChild(overlay);

      const ctp = document.createElement('div');
      ctp.className = 'clickToPlay';
      ctp.textContent = 'CLICK TO PLAY';

      tile.appendChild(header);
      tile.appendChild(buttons);
      tile.appendChild(thumbWrap);
      tile.appendChild(ctp);

      tile.addEventListener('click', (e) => {
        const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
        if (tag === 'button') return;
        openModal(item);
      });

      btnExternal.addEventListener('click', (e) => {
        e.stopPropagation();
        const ext = getExternal(item);
        if (ext) window.open(ext, '_blank');
      });

      return tile;
    }

    function openModal(item){
      currentModalItem = item;
      modalTitle.textContent = `${getTitle(item) || 'Playable'} – ${getCompany(item) || ''}`.trim();

      const endpoint = getEndpoint(item);
      const external = getExternal(item);

      modalHint.textContent = '';

      if (!endpoint){
        modalFrame.src = 'about:blank';
        modalHint.textContent = 'Missing Endpoint URL in JSON. Add an "Endpoint URL" value for this item.';
      } else {
        modalFrame.src = bust(endpoint);
      }

      modalExternal.onclick = () => {
        if (external) window.open(external, '_blank');
      };
      modalReload.onclick = () => reloadModalFrame();

      modalBackdrop.style.display = 'flex';
    }

    function reloadModalFrame(){
      if (!currentModalItem) return;
      const endpoint = getEndpoint(currentModalItem);
      if (!endpoint) return;
      modalFrame.src = bust(endpoint);
    }

    function bust(url){
      const join = url.includes('?') ? '&' : '?';
      return url + join + '_=' + Date.now();
    }

    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop){
        modalBackdrop.style.display = 'none';
        modalFrame.src = 'about:blank';
        currentModalItem = null;
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modalBackdrop.style.display === 'flex'){
        modalBackdrop.style.display = 'none';
        modalFrame.src = 'about:blank';
        currentModalItem = null;
      }
    });

    searchInput.addEventListener('input', applyFilters);
    genreSelect.addEventListener('change', applyFilters);
    companySelect.addEventListener('change', applyFilters);

    loadData().catch(err => {
      console.error(err);
      brandGrid.innerHTML = `<div style="padding:16px;color:#ff6a00;">${err.message}</div>`;
    });
  </script>
</body>
</html>
